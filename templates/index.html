<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>SkyMon — Live Air Traffic</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header><div><span class="eyebrow">SKYMON</span><h1>LIVE AIR TRAFFIC</h1></div><button id="theme-toggle" aria-label="Alternar modo noturno">☾</button></header>
  <main>
    <button id="filters-toggle" type="button" aria-label="Ocultar filtros" aria-expanded="true">☰</button>
    <aside id="controls" aria-label="Controles do radar">
      <div class="controls-heading"><span>FILTROS</span><span>TOQUE NO ☰ PARA OCULTAR</span></div>
      <label>Alcance <output id="radius-value">{{ radius }} km</output><input id="radius" type="range" min="50" max="200" step="50" value="{{ radius }}"></label>
      <label>Altitude mínima <select id="altitude"><option value="0">Todas</option><option value="10000">10.000 ft</option><option value="25000">25.000 ft</option><option value="35000">35.000 ft</option></select></label>
      <label>Companhia / voo <input id="search" type="search" placeholder="Ex.: TAM, GLO, AZU"></label>
      <button id="follow-vcp">⌖ Viracopos</button>
    </aside>
    <section id="map" aria-label="Mapa de tráfego aéreo"></section>
    <section id="details" class="panel hidden" aria-live="polite"><button class="close" aria-label="Fechar detalhes">×</button><span class="eyebrow">AERONAVE</span><h2 id="detail-callsign">—</h2><dl id="detail-data"></dl></section>
  </main>
  <footer><div><strong id="aircraft-count">0</strong> aviões <span>·</span> alcance: <strong id="range-label">{{ radius }} km</strong></div><div id="update-status">Conectando ao OpenSky…</div></footer>
  <script>window.SKYMON_CONFIG = {center: [{{ center_lat }}, {{ center_lon }}], radius: {{ radius }}};</script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="/static/js/app.js"></script>
</body></html>
